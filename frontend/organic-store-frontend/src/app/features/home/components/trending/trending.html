<section class="bg-white py-30 px-6 md:px-10 relative">

  <div class="max-w-7xl mx-auto text-center">

      
      <!-- Heading -->
      <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-6 font-['Merriweather']">
          Trending Products
        </h2>
        
        <!-- Top Leaf -->
        <img 
          src="https://websitedemos.net/organic-shop-02/wp-content/uploads/sites/465/2019/07/logo-leaf-new.png"
          class="mx-auto w-18 mb-12"
        />

    <!-- Products Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

  @for (product of trendingProducts; track product.id) {

    <div
      class="bg-white p-4 rounded-lg shadow-md hover:shadow-lg transition"
    >

      <img
        [src]="product.image"
        [alt]="product.name"
        class="w-full h-56 object-contain mb-4"
      />

      <p class="text-sm text-gray-500">
        {{ product.category }}
      </p>

      <h3 class="text-lg font-semibold text-gray-900">
        {{ product.name }}
      </h3>

      <!-- Rating -->
      <div class="text-yellow-400 text-sm">

        @for(star of [1,2,3,4,5]; track star) {

          <span>
            {{ star <= product.rating ? '★' : '☆' }}
          </span>

        }

      </div>

      <!-- Price -->
      <p class="text-green-600 font-bold mt-2">

        @if(product.originalPrice) {

          <span class="line-through text-gray-400 mr-2">
            ${{ product.originalPrice }}
          </span>

        }

        ${{ product.price }}

      </p>

    </div>

  }

</div>

  </div>

</section>
