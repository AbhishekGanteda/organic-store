            alt="Organic Store" class="w-[150px] h-auto" />
    </a>

    <!-- Desktop Menu -->
    <ul class="hidden lg:flex gap-10 text-gray-700 text-base">
        <li class="hover:text-green-600 cursor-pointer"><a routerLink="/">Home</a></li>

        <div routerLink="/auth" class="hidden lg:block">

                person
            </span>

        <!-- Cart Icon -->
        <div routerLink="/cart" class="hidden lg:block">
