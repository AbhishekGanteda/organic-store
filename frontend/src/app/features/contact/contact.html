<!-- HERO -->
<section class="bg-[#f8f6f3] py-24 text-center">

  <h1 class="text-5xl font-bold font-serif mb-8">
    Get In Touch
  </h1>

</section>

<!-- CONTACT CARDS -->
<section class="bg-[#f8f6f3] pb-24">

  <div class="w-[95%] max-w-7xl mx-auto bg-white relative rounded-sm px-10 py-24">

    <!-- LEAF -->
    <img
      src="https://websitedemos.net/organic-shop-02/wp-content/uploads/sites/465/2021/03/basil-leaf.png"
      class="absolute left-1/2 -top-10 -translate-x-1/2 w-48"
    />

    <div id="connect" class="grid grid-cols-1 md:grid-cols-3 gap-10">

      <!-- PHONE -->
      <div class="border border-gray-200 py-8 px-10 text-center">

        <i class="fa-solid fa-phone text-[#8bc34a] text-3xl mb-4"></i>

        <p class="text-md text-gray-700 leading-6">
          +123 456 7890
          <br />
          +123 456 7890
        </p>

      </div>

      <!-- EMAIL -->
      <div class="border border-gray-200 py-8 px-10 text-center">

        <i class="fa-regular fa-envelope text-[#8bc34a] text-3xl mb-4"></i>

        <p class="text-md text-gray-700 leading-6">
          info@example.com
          <br />
          support@example.com
        </p>

      </div>

      <!-- ADDRESS -->
      <div class="border border-gray-200 py-8 px-10 text-center">

        <i class="fa-solid fa-location-dot text-[#8bc34a] text-3xl mb-4"></i>

        <p class="text-md text-gray-700 leading-6">
          1569 Ave, New York,
          <br />
          NY 10028, USA
        </p>

      </div>

    </div>

  </div>

</section>

<!-- FAQ -->
<section class="pb-20 bg-[#f8f6f3] relative overflow-hidden">

  <div class="max-w-6xl mx-auto px-6">

    <!-- TITLE -->
    <div class="text-center mb-20">

      <h2 class="text-3xl font-bold font-serif mb-6">
        Frequently Asked Question!
      </h2>

      <img
        src="https://websitedemos.net/organic-shop-02/wp-content/uploads/sites/465/2019/07/logo-leaf-new.png"
        class="mx-auto w-20"
      />

    </div>

    <!-- FAQ GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-20 gap-y-10">

      @for(faq of faqItems; track faq.question; let i = $index) {

      <div class="border-b border-gray-300 pb-8">

        <!-- QUESTION -->
        <button
          class="w-full flex justify-between items-center text-left"
          (click)="toggleFaq(i)"
        >

          <span class="text-lg font-semibold">
            {{ faq.question }}
          </span>

          <i
            class="fa-solid"
            [class.fa-chevron-down]="!faq.isOpen"
            [class.fa-chevron-up]="faq.isOpen"
          ></i>

        </button>

        <!-- ANSWER -->
        @if(faq.isOpen) {

        <p class="text-gray-600 text-lg leading-10 mt-6">
          {{ faq.answer }}
        </p>

        }

      </div>

      }

    </div>

  </div>

</section>

<!-- MAP -->
<section id="map">

  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3021.8976767816835!2d-73.98930868459389!3d40.74189597932812!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c259af18b5e7d1%3A0x9f5f7c148d464472!2sNew%20York!5e0!3m2!1sen!2sin!4v1715070000000!5m2!1sen!2sin"
    width="100%"
    height="500"
    style="border:0;"
    allowfullscreen=""
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"
  >
  </iframe>

</section>
