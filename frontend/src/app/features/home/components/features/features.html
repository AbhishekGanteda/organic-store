<section class="bg-black py-12 px-6 md:px-10">

  <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

    @for (feature of features; track feature.id) {
       <!-- Card -->
       <div class="bg-[#2a2a2a] p-6 rounded-lg flex items-start gap-4 hover:bg-[#333] hover:scale-105 transition cursor-pointer">
         <span class="material-icons text-green-500 text-3xl">{{ feature.icon }}</span>
         <div>
           <h3 class="text-white font-semibold text-lg">{{ feature.name }}</h3>
           <p class="text-gray-400 text-sm">{{ feature.description }}</p>
         </div>
       </div>
     }

  </div>

</section>
