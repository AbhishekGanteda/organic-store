<section class="bg-gray-100 py-20 px-6 md:px-10">

  <div class="max-w-7xl mx-auto text-center">

    <!-- Heading -->
    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-6 font-['Merriweather']">
      Customer Reviews
    </h2>

    <!-- Leaf -->
    <img 
      src="https://websitedemos.net/organic-shop-02/wp-content/uploads/sites/465/2019/07/logo-leaf-new.png"
      class="mx-auto w-16 mb-12"
    />

    <!-- Cards -->
    <div class="flex gap-14 overflow-x-auto scrollbar-hide pb-4">

      @for (review of reviews; track review.id) {

        <!-- CARD -->
        <app-review-card [review]="review" />

      }

    </div>

  </div>

</section>
