<section class="bg-[#f8f6f3] py-16">

    <div class="w-[95%] max-w-7xl mx-auto">

        <!-- RIGHT SIDE -->
        <div>

            <!-- TOP -->
            <div class="mb-12">

                <h1 class="text-5xl font-bold text-[#8bc34a] font-serif mb-8">
                    Shop
                </h1>

                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5">

                    <div class="flex">

                        <input type="text" placeholder="Search products..." [(ngModel)]="searchText"
                            (input)="filterProducts()"
                            class="w-full bg-white border border-gray-300 px-3 py-3 outline-none" />

                        <button class="bg-[#8bc34a] px-3 text-white text-xl cursor-pointer">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>

                    </div>

                    <select class="border border-gray-300 px-3 py-2 bg-white outline-none"
                        (change)="sortProducts($event)">

                        <option value="default">
                            Default sorting
                        </option>

                        <option value="price">
                            Sort by price
                        </option>

                        <option value="popularity">
                            Sort by popularity
                        </option>

                    </select>

                </div>

            </div>

            <!-- PRODUCTS GRID -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4">

                @for(product of filteredProducts; track product.id) {

                <div class="rounded-lg hover:shadow-lg transition text-center mb-10">

                    <img [src]="product.image" [alt]="product.name" class="w-full h-65 object-contain mb-4" />

                    <p class="text-sm text-gray-500">
                        {{ product.category }}
                    </p>

                    <h3 class="text-lg font-semibold">
                        {{ product.name }}
                    </h3>

                    <div class="text-yellow-400 text-sm">

                        @for(star of [1,2,3,4,5]; track star) {

                        <span>
                            {{ star <= product.rating ? '★' : '☆' }} </span>

                                }

                    </div>

                    <p class="text-green-600 font-bold mt-2">
                        ${{ product.price }}
                    </p>

                </div>

                }

            </div>

        </div>

    </div>

</section>
